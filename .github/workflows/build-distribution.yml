name: Build distribution packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-x86_64:
    name: Linux x86_64 package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build pkg-config rsync \
            autoconf automake libtool gettext autopoint \
            qtbase5-dev qttools5-dev qttools5-dev-tools \
            qtdeclarative5-dev qtlocation5-dev qtmultimedia5-dev \
            libqt5serialport5-dev libqt5opengl5-dev libgl1-mesa-dev

      - name: Build Linux package tree
        env:
          MADMODEM_MIND_OPENMP: ON
          MADMODEM_Q65_FULL: OFF
        run: |
          bash scripts/build_linux_github.sh

      - name: Package Linux artifact
        run: |
          bash scripts/package_linux_github.sh
          ls -lh dist/packages

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: MadModem-Linux-x86_64
          path: dist/packages/MadModem-*-Linux-x86_64.tar.gz
          if-no-files-found: error
          retention-days: 14

  windows-mxe:
    name: Windows x86_64 MXE static packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools for MXE/Hamlib
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates gnupg software-properties-common lsb-release \
            build-essential cmake ninja-build pkg-config zip rsync \
            autoconf automake libtool gettext autopoint curl git python3

      - name: Install MXE static Qt5 toolchain
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-keys 86B72ED9
          for codename in "$(lsb_release -sc)" noble jammy focal; do
            echo "Trying MXE APT repository codename: ${codename}"
            echo "deb [arch=amd64] https://pkg.mxe.cc/repos/apt ${codename} main" | sudo tee /etc/apt/sources.list.d/mxe.list
            if sudo apt-get update && apt-cache show mxe-x86-64-w64-mingw32.static-qtbase >/dev/null 2>&1; then
              echo "MXE APT repository selected: ${codename}"
              break
            fi
          done
          apt-cache policy mxe-x86-64-w64-mingw32.static-qtbase || true
          sudo apt-get install -y --no-install-recommends \
            mxe-x86-64-w64-mingw32.static-cc \
            mxe-x86-64-w64-mingw32.static-cmake \
            mxe-x86-64-w64-mingw32.static-pkgconf \
            mxe-x86-64-w64-mingw32.static-qtbase \
            mxe-x86-64-w64-mingw32.static-qttools \
            mxe-x86-64-w64-mingw32.static-qtdeclarative \
            mxe-x86-64-w64-mingw32.static-qtlocation \
            mxe-x86-64-w64-mingw32.static-qtmultimedia \
            mxe-x86-64-w64-mingw32.static-qtserialport \
            mxe-x86-64-w64-mingw32.static-qtsvg \
            mxe-x86-64-w64-mingw32.static-qtimageformats \
            mxe-x86-64-w64-mingw32.static-fftw
          test -x /usr/lib/mxe/usr/bin/x86_64-w64-mingw32.static-cmake
          /usr/lib/mxe/usr/bin/x86_64-w64-mingw32.static-g++ --version | head -1

      - name: Build Windows MXE static variants
        env:
          MXE_ROOT: /usr/lib/mxe
          MXE_TARGET: x86_64-w64-mingw32.static
          MADMODEM_MIND_OPENMP: ON
          MADMODEM_Q65_FULL: OFF
          MADMODEM_WINDOWS_BUILD_LEGACY: on
          MADMODEM_WINDOWS_BUILD_AVX2: on
        run: |
          bash scripts/build_windows_mxe.sh

      - name: Package Windows MXE static artifacts
        env:
          MXE_ROOT: /usr/lib/mxe
          MXE_TARGET: x86_64-w64-mingw32.static
          MADMODEM_WINDOWS_BUILD_LEGACY: on
          MADMODEM_WINDOWS_BUILD_AVX2: on
        run: |
          bash scripts/package_windows_mxe.sh
          ls -lh dist/packages

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MadModem-Windows-x86_64-MXE-static
          path: |
            dist/packages/MadModem-*-Windows-x86_64-legacy-static.zip
            dist/packages/MadModem-*-Windows-x86_64-avx2-static.zip
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS ${{ matrix.arch }} unsigned package
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
          - arch: x86_64
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install macOS build dependencies
        run: |
          brew update
          brew install cmake ninja qt qtlocation hamlib pkgconf rsync dylibbundler

      - name: macOS source portability preflight
        run: |
          bash scripts/check_macos_portability.sh

      - name: Build MadModem.app
        env:
          MADMODEM_OSX_ARCHITECTURES: ${{ matrix.arch }}
          MADMODEM_MIND_OPENMP: OFF
          MADMODEM_Q65_FULL: OFF
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: |
          bash scripts/build_macos.sh

      - name: Package unsigned macOS app
        env:
          MADMODEM_OSX_ARCHITECTURES: ${{ matrix.arch }}
          MADMODEM_ADHOC_SIGN: on
        run: |
          bash scripts/package_macos.sh
          ls -lh dist/macos

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MadModem-macOS-${{ matrix.arch }}-unsigned
          path: |
            dist/macos/*.zip
            dist/macos/*.dmg
          if-no-files-found: error
          retention-days: 14

  github-release:
    name: Publish GitHub Release on tag
    needs:
      - linux-x86_64
      - windows-mxe
      - macos
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: |
          find release-assets -maxdepth 2 -type f -print -exec ls -lh {} \;

      - name: Create GitHub Release and upload packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          title="MadModem ${tag}"
          notes_file="RELEASE_NOTES.md"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" release-assets/* --clobber
          else
            gh release create "$tag" release-assets/* --title "$title" --notes-file "$notes_file"
          fi
