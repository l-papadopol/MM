help.autoqso_flow_html=<h2>Editor MM Flow</h2><p>Questo editor sta diventando il livello di programmazione visuale di MadModem. Oggi salva e valida il grafo del flow; la sicurezza reale di PTT/audio/CAT resta comunque nello scheduler.</p><h3>Modifica di base</h3><ul><li><b>Crea un blocco:</b> premi uno dei pulsanti +, scegli tipo, titolo e nota.</li><li><b>Crea una freccia:</b> seleziona due blocchi, premi <b>Connetti freccia</b> e scegli la porta di uscita se serve.</li><li><b>Elimina una freccia:</b> fai clic sulla linea della freccia e premi <b>Elimina frecce</b> oppure il tasto Canc.</li><li><b>Elimina un blocco:</b> seleziona il blocco e premi Canc. Anche le frecce collegate vengono rimosse.</li><li><b>Modifica:</b> seleziona un solo blocco e premi <b>Modifica selezionato</b>. Scorciatoie: Canc, Ctrl+E, Ctrl+L, Ctrl+H.</li></ul><h3>Blocchi di programmazione</h3><ul><li><b>Variabile:</b> imposta/copia/incrementa/cancella/lista/mappa valori.</li><li><b>Confronto:</b> confronta variabili, costanti, nominativi decodificati, bande, modi e regex.</li><li><b>Ciclo:</b> itera su decodifiche, candidati, righe log o contatori limitati. Usa porte next/done oppure loop/exit.</li><li><b>I/O:</b> input da tastiera, popup messaggio/domanda, stato, messaggio log, output tabellare.</li><li><b>Timer:</b> attesa slot FT, attesa finestra decode, ritardo retry, intervallo, watchdog, trigger tempo UTC.</li><li><b>Matematica:</b> aritmetica più funzioni radio come distanza/bearing da locator.</li></ul><h3>Modello di sicurezza</h3><p>I flow possono richiedere azioni astratte dell'app. Operazioni pericolose come TX, PTT, avvio audio, CAT QSY, scrittura file e operazioni dello scheduler devono passare dalle protezioni runtime di MadModem.</p>
