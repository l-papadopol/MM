help.autoqso_flow_html=<h2>MM-Flow-Editor</h2><p>Dieser Editor wird zur visuellen Programmierschicht von MadModem. Er speichert und validiert den Flow-Graphen; die echte PTT/Audio/CAT-Sicherheit bleibt im Scheduler.</p><h3>Grundbearbeitung</h3><ul><li><b>Block erstellen:</b> eine +-Taste drücken, Typ, Titel und Notiz wählen.</li><li><b>Pfeil erstellen:</b> zwei Blöcke wählen, <b>Pfeil verbinden</b> drücken und bei Bedarf den Ausgangsport wählen.</li><li><b>Pfeil löschen:</b> Pfeillinie anklicken und <b>Pfeile löschen</b> oder Entf drücken.</li><li><b>Block löschen:</b> Block auswählen und Entf drücken. Verbundene Pfeile werden ebenfalls entfernt.</li><li><b>Bearbeiten:</b> genau einen Block auswählen und <b>Auswahl bearbeiten</b> drücken. Kürzel: Entf, Ctrl+E, Ctrl+L, Ctrl+H.</li></ul><h3>Programmierblöcke</h3><ul><li><b>Variable:</b> Werte setzen/kopieren/erhöhen/löschen/listen/zuordnen.</li><li><b>Vergleich:</b> Variablen, Konstanten, dekodierte Rufzeichen, Bänder, Modi und Regex vergleichen.</li><li><b>Schleife:</b> über Decodes, Kandidaten, Logzeilen oder begrenzte Zähler iterieren. Ports next/done oder loop/exit verwenden.</li><li><b>I/O:</b> Tastatureingabe, Popup-Meldung/Frage, Statusmeldung, Logmeldung, Tabellenausgabe.</li><li><b>Timer:</b> FT-Slot-Wartezeit, Decode-Fenster, Retry-Verzögerung, Intervall, Watchdog, UTC-Zeittrigger.</li><li><b>Mathe:</b> Arithmetik plus Funkhilfen wie Locator-Distanz/Azimut.</li></ul><h3>Sicherheitsmodell</h3><p>Flows dürfen abstrakte App-Aktionen anfordern. Gefährliche Operationen wie TX, PTT, Audiostart, CAT QSY, Dateischreiben und Scheduler-Operationen müssen durch MadModems Runtime-Schutz laufen.</p>
