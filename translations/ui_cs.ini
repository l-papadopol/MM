help.autoqso_flow_html=<h2>Editor MM Flow</h2><p>Tento editor se stává vizuální programovací vrstvou MadModem. Ukládá a ověřuje graf flow; skutečná bezpečnost PTT/audio/CAT zůstává ve scheduleru.</p><h3>Základní úpravy</h3><ul><li><b>Vytvořit blok:</b> stiskni tlačítko +, zvol typ, název a poznámku.</li><li><b>Vytvořit šipku:</b> vyber dva bloky, stiskni <b>Připojit šipku</b> a případně zvol výstupní port.</li><li><b>Smazat šipku:</b> klikni na čáru šipky a stiskni <b>Smazat šipky</b> nebo Delete.</li><li><b>Smazat blok:</b> vyber blok a stiskni Delete. Připojené šipky budou odstraněny také.</li><li><b>Upravit:</b> vyber přesně jeden blok a stiskni <b>Upravit vybrané</b>. Zkratky: Delete, Ctrl+E, Ctrl+L, Ctrl+H.</li></ul><h3>Programovací bloky</h3><ul><li><b>Proměnná:</b> nastavit/kopírovat/inkrementovat/vymazat/list/map hodnoty.</li><li><b>Porovnat:</b> porovnává proměnné, konstanty, dekódované značky, pásma, režimy a regex.</li><li><b>Smyčka:</b> iteruje přes dekódy, kandidáty, řádky logu nebo omezené čítače. Použij porty next/done nebo loop/exit.</li><li><b>I/O:</b> vstup z klávesnice, popup zpráva/dotaz, stavová zpráva, log zpráva, tabulkový výstup.</li><li><b>Timer:</b> čekání na FT slot, čekání okna dekódování, retry prodleva, interval, watchdog, UTC časový trigger.</li><li><b>Matematika:</b> aritmetika a radio pomůcky jako vzdálenost/azimut z locatoru.</li></ul><h3>Bezpečnostní model</h3><p>Flows mohou požadovat abstraktní akce aplikace. Nebezpečné operace jako TX, PTT, spuštění audia, CAT QSY, zápis souborů a operace scheduleru musí projít runtime ochranami MadModem.</p>
