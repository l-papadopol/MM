# 0.5.78-lab5 Settings layout and station coordinates
Precise station coordinates=Přesné souřadnice stanice
Use precise latitude/longitude instead of locator centre=Použít přesnou šířku/délku místo středu lokátoru
When enabled, rotator and map modules may use exact station coordinates instead of the approximate Maidenhead locator centre.=Je-li zapnuto, moduly rotátoru a mapy mohou používat přesné souřadnice stanice místo přibližného středu lokátoru Maidenhead.
Latitude=Zeměpisná šířka
Longitude=Zeměpisná délka
Station latitude in decimal degrees. North is positive, south is negative.=Zeměpisná šířka stanice v desetinných stupních. Sever je kladný, jih záporný.
Station longitude in decimal degrees. East is positive, west is negative.=Zeměpisná délka stanice v desetinných stupních. Východ je kladný, západ záporný.
Leave disabled to derive the station position from the Maidenhead locator.=Nechte vypnuté pro odvození polohy stanice z lokátoru Maidenhead.

