help.autoqso_flow_html=<h2>MM Flow editor</h2><p>This editor is becoming the visual programming layer for MadModem. Today it stores and validates the flow graph; live PTT/audio/CAT safety still remains in the scheduler.</p><h3>Basic editing</h3><ul><li><b>Create a block:</b> press one of the + buttons, choose the type, title and note.</li><li><b>Create an arrow:</b> select two blocks, press <b>Connect arrow</b>, choose the output port if needed.</li><li><b>Delete an arrow:</b> click the arrow line and press <b>Delete arrows</b> or the Delete key.</li><li><b>Delete a block:</b> select the block and press Delete. Connected arrows are removed too.</li><li><b>Edit:</b> select exactly one block and press <b>Edit selected</b>. Shortcuts: Delete, Ctrl+E, Ctrl+L, Ctrl+H.</li></ul><h3>Programming blocks</h3><ul><li><b>Variable:</b> set/copy/increment/clear/list/map values.</li><li><b>Compare:</b> compare variables, constants, decoded calls, bands, modes and regex matches.</li><li><b>Loop:</b> iterate over decodes, candidates, log rows or bounded counters. Use next/done or loop/exit ports.</li><li><b>I/O:</b> keyboard input, popup message/question, status message, log message, table output.</li><li><b>Timer:</b> FT slot wait, decode-window wait, retry delay, interval, watchdog, UTC time trigger.</li><li><b>Math:</b> arithmetic plus radio helpers such as locator distance/bearing.</li></ul><h3>Safety model</h3><p>Flows may request abstract app actions. Dangerous operations such as TX, PTT, audio start, CAT QSY, file writes and scheduler operations must pass through MadModem's runtime guards.</p>
